<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cierre Contable · Inversiones Bolívar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gidole&family=Arimo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --brand:#8A6D3B; --brand-dk:#67512C; --brand-lt:#A7916C;
  --green:#00A651; --green-dk:#00803E; --green-bg:#E7F8EF;
  --orange:#FA8D29; --orange-bg:#FFF1E2;
  --slate:#8A97AC; --slate-bg:#F0F2F5;
  --purple:#6C6FA0; --purple-bg:#EDEDF7;
  --bg:#F4F6F9; --card:#FFFFFF; --border:#E3E8EF;
  --text:#3D3F3B; --text-soft:#646569; --text-faint:#93A0B4;
  --danger:#D64550; --danger-bg:#FCEBEC;
  --cream:#DDD2BC;
  --radius:14px; --radius-sm:9px;
  --shadow: 0 1px 2px rgba(20,30,50,.04), 0 4px 16px rgba(20,30,50,.06);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Arimo', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  background:var(--bg); color:var(--text); font-size:14.5px; line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.section-title,.hero-text h2,.u-name,.m-name,.kpi-num,.hero-pct{font-family:'Gidole', 'Arimo', sans-serif;}
#app{max-width:1240px; margin:0 auto; padding:0 22px 60px;}
::selection{background:var(--green-bg); color:var(--brand-dk);}

/* ---------- Banner demo ---------- */
.demo-banner{
  background:linear-gradient(90deg,#FFF6E8,#FFF1E2); border-bottom:1px solid #F3D8A8;
  color:#8A5A15; font-size:12.5px; padding:8px 22px; display:flex; align-items:center; gap:8px;
  justify-content:center; font-weight:600;
}
.demo-banner svg{flex:none;}

/* ---------- Header ---------- */
header.top{
  display:flex; align-items:center; justify-content:space-between;
  padding:22px 0 16px; gap:16px; flex-wrap:wrap;
}
.brand{display:flex; align-items:center; gap:12px;}
.brand-mark{
  width:42px; height:42px; border-radius:11px;
  background:linear-gradient(135deg,var(--brand),var(--brand-lt));
  display:flex; align-items:center; justify-content:center; flex:none;
  box-shadow:0 4px 12px rgba(138,109,59,.32);
}
.brand h1{font-size:17.5px; margin:0; font-weight:700; color:var(--brand-dk); letter-spacing:-.2px;}
.brand p{margin:1px 0 0; font-size:12px; color:var(--text-faint); font-weight:600; letter-spacing:.3px; text-transform:uppercase;}
.brand-word{font-family:'Gidole','Arimo',sans-serif; color:var(--brand); text-transform:none; letter-spacing:.2px;}

.head-right{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
select.cycle-select{
  appearance:none; -webkit-appearance:none; border:1.5px solid var(--border); background:var(--card) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6"><path d="M1 1l4 4 4-4" stroke="%235C6B84" stroke-width="1.6" fill="none"/></svg>') no-repeat right 12px center;
  padding:9px 32px 9px 14px; border-radius:10px; font-size:13.5px; font-weight:600; color:var(--brand-dk); cursor:pointer;
}
select.cycle-select:focus{outline:2px solid var(--green); outline-offset:1px;}

.user-chip{
  display:flex; align-items:center; gap:9px; background:var(--card); border:1.5px solid var(--border);
  padding:6px 14px 6px 6px; border-radius:100px; cursor:default;
}
.avatar{
  width:30px; height:30px; border-radius:50%; background:var(--brand); color:#fff;
  display:flex; align-items:center; justify-content:center; font-size:11.5px; font-weight:700; flex:none;
}
.user-chip .u-name{font-size:13px; font-weight:600; color:var(--text); line-height:1.15;}
.user-chip .u-role{font-size:10.5px; color:var(--text-faint); font-weight:600; text-transform:uppercase; letter-spacing:.3px;}
.admin-tag{background:var(--orange-bg); color:#95560D; font-size:9.5px; font-weight:800; padding:2px 7px; border-radius:100px; letter-spacing:.4px; text-transform:uppercase; margin-left:2px;}
.viewer-tag{background:var(--slate-bg); color:#5B6779; font-size:9.5px; font-weight:800; padding:2px 7px; border-radius:100px; letter-spacing:.4px; text-transform:uppercase; margin-left:2px;}

/* ---------- Nav tabs ---------- */
nav.tabs{display:flex; gap:4px; border-bottom:1.5px solid var(--border); margin-bottom:26px;}
nav.tabs button{
  background:none; border:none; padding:12px 6px; margin-right:22px; font-size:14px; font-weight:650;
  color:var(--text-faint); cursor:pointer; position:relative; top:1.5px; font-family:inherit;
}
nav.tabs button.active{color:var(--brand-dk); border-bottom:2.5px solid var(--green);}
nav.tabs button:hover:not(.active){color:var(--text-soft);}

/* ---------- Cards / generic ---------- */
.card{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow);}
.section-title{font-size:15.5px; font-weight:700; color:var(--brand-dk); margin:0 0 3px; letter-spacing:-.1px;}
.section-sub{font-size:12.5px; color:var(--text-faint); margin:0 0 16px;}
.btn{
  display:inline-flex; align-items:center; gap:7px; border:none; border-radius:9px; padding:9px 16px;
  font-size:13px; font-weight:650; cursor:pointer; font-family:inherit; transition:transform .08s ease;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--brand); color:#fff;}
.btn-primary:hover{background:var(--brand-dk);}
.btn-ghost{background:var(--card); color:var(--brand-dk); border:1.5px solid var(--border);}
.btn-ghost:hover{border-color:var(--brand-lt); background:#FAFBFD;}
.btn-green{background:var(--green); color:#fff;}
.btn-green:hover{background:var(--green-dk);}
.btn-sm{padding:6px 12px; font-size:12px; border-radius:7px;}

/* ---------- Pills / estado ---------- */
.pill{display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:700; padding:4px 10px 4px 8px; border-radius:100px; white-space:nowrap;}
.pill .dot{width:6px; height:6px; border-radius:50%;}
.pill.Completado{background:var(--green-bg); color:var(--green-dk);} .pill.Completado .dot{background:var(--green);}
.pill.Enproceso{background:var(--orange-bg); color:#95560D;} .pill.Enproceso .dot{background:var(--orange);}
.pill.Noiniciado{background:var(--slate-bg); color:#5B6779;} .pill.Noiniciado .dot{background:var(--slate);}
.pill.Noaplica{background:var(--purple-bg); color:#4E4F86;} .pill.Noaplica .dot{background:var(--purple);}

select.estado-select{
  border:1.5px solid var(--border); border-radius:8px; padding:5px 26px 5px 10px; font-size:12px; font-weight:700;
  font-family:inherit; cursor:pointer; appearance:none; -webkit-appearance:none;
  background:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="9" height="6"><path d="M1 1l3.5 3.5L8 1" stroke="%235C6B84" stroke-width="1.5" fill="none"/></svg>') no-repeat right 9px center;
}
select.estado-select.Completado{background-color:var(--green-bg); color:var(--green-dk); border-color:#BFE9D2;}
select.estado-select.Enproceso{background-color:var(--orange-bg); color:#95560D; border-color:#F6D6AA;}
select.estado-select.Noiniciado{background-color:var(--slate-bg); color:#5B6779; border-color:var(--border);}
select.estado-select.Noaplica{background-color:var(--purple-bg); color:#4E4F86; border-color:#D6D6EF;}

/* ---------- Progress bar ---------- */
.pbar-track{height:7px; border-radius:100px; background:var(--slate-bg); overflow:hidden; position:relative;}
.pbar-fill{height:100%; border-radius:100px; background:linear-gradient(90deg,var(--green),#1EC876); transition:width .4s ease;}

/* ---------- Stamp (signature element) ---------- */
.stamp{width:52px; height:52px; opacity:.9; mix-blend-mode:multiply; transform:rotate(-9deg); flex:none;}

/* ---------- Mis tareas ---------- */
.mt-head{display:flex; align-items:center; justify-content:space-between; gap:20px; flex-wrap:wrap; margin-bottom:22px;}
.mt-progress-card{
  background:linear-gradient(120deg,var(--brand),var(--brand-lt)); border-radius:var(--radius); padding:20px 24px;
  color:#fff; display:flex; align-items:center; gap:22px; flex-wrap:wrap; position:relative; overflow:hidden;
}
.mt-progress-card::after{content:''; position:absolute; right:-40px; top:-40px; width:180px; height:180px; border-radius:50%; background:rgba(255,255,255,.05);}
.mt-progress-num{font-size:34px; font-weight:800; letter-spacing:-1px;}
.mt-progress-label{font-size:12.5px; opacity:.8; font-weight:600;}
.mt-progress-card .pbar-track{background:rgba(255,255,255,.18); flex:1; min-width:140px;}
.mt-progress-card .pbar-fill{background:#fff;}

.modulo-group{margin-bottom:16px;}
.modulo-head{display:flex; align-items:center; gap:10px; padding:13px 4px 9px;}
.modulo-head h3{font-size:14px; margin:0; font-weight:700; color:var(--brand-dk); flex:1;}
.modulo-head .m-count{font-size:11.5px; color:var(--text-faint); font-weight:600;}
.task-row{
  display:grid; grid-template-columns:1fr auto auto; gap:14px; align-items:center;
  padding:13px 16px; border-bottom:1px solid var(--border);
}
.task-row:last-child{border-bottom:none;}
.task-title{font-size:13.5px; font-weight:600; color:var(--text);}
.task-meta{font-size:11.5px; color:var(--text-faint); margin-top:2px;}
.task-meta.overdue{color:var(--danger); font-weight:700;}

/* ---------- Dashboard ---------- */
.kpi-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:22px;}
.kpi-card{padding:18px 20px; display:flex; align-items:center; gap:14px;}
.kpi-icon{width:40px; height:40px; border-radius:11px; display:flex; align-items:center; justify-content:center; flex:none;}
.kpi-icon.i-brand{background:var(--slate-bg); color:var(--brand);}
.kpi-icon.i-green{background:var(--green-bg); color:var(--green-dk);}
.kpi-icon.i-purple{background:var(--purple-bg); color:var(--purple);}
.kpi-icon.i-danger{background:var(--danger-bg); color:var(--danger);}
.kpi-num{font-size:27px; font-weight:800; color:var(--brand-dk); letter-spacing:-.5px;}
.kpi-label{font-size:12px; color:var(--text-faint); font-weight:650; margin-top:2px;}
.kpi-card.accent .kpi-num{color:var(--green-dk);}
.kpi-card.warn .kpi-num{color:var(--danger);}

/* ---------- Dashboard hero ---------- */
.dash-hero{
  display:flex; align-items:center; gap:26px; padding:24px 28px; margin-bottom:18px;
  background:linear-gradient(135deg,var(--brand),var(--brand-lt)); border-radius:var(--radius); color:#fff;
  box-shadow:var(--shadow); flex-wrap:wrap;
}
.hero-ring{position:relative; width:104px; height:104px; flex:none;}
.hero-ring svg{width:100%; height:100%; transform:rotate(-90deg); display:block;}
.hero-ring .ring-track{fill:none; stroke:rgba(255,255,255,.2); stroke-width:9;}
.hero-ring .ring-fill{fill:none; stroke:#fff; stroke-width:9; stroke-linecap:round; transition:stroke-dasharray .6s ease;}
.hero-ring.done .ring-fill{stroke:#8CF5C4;}
.hero-ring-label{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
.hero-pct{font-size:23px; font-weight:800; line-height:1;}
.hero-pct-sub{font-size:9.5px; color:rgba(255,255,255,.75); text-transform:uppercase; letter-spacing:.4px; margin-top:2px;}
.hero-text{flex:1; min-width:200px;}
.hero-text h2{margin:0 0 4px; font-size:18px;}
.hero-text p{margin:0; font-size:12.8px; color:rgba(255,255,255,.85);}
.hero-stamp{display:inline-block; margin-top:9px; background:rgba(255,255,255,.18); border-radius:100px; padding:5px 14px; font-size:12px; font-weight:700;}

.donut-wrap{position:relative; width:148px; height:148px; margin:6px auto 2px;}
.donut-svg{width:100%; height:100%; transform:rotate(-90deg); display:block;}
.donut-svg circle{transition:stroke-dasharray .5s ease;}
.donut-center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
.donut-center-pct{font-size:22px; font-weight:800; color:var(--brand-dk); line-height:1;}
.donut-center-sub{font-size:10px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.3px; margin-top:2px;}
.donut-legend{display:flex; flex-wrap:wrap; gap:8px 16px; justify-content:center; margin-top:14px; font-size:12px; color:var(--text-soft);}
.legend-dot{display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:5px; vertical-align:middle;}

.p-avatar{width:24px; height:24px; border-radius:50%; background:var(--brand); color:#fff; font-size:10px; font-weight:700;
  display:inline-flex; align-items:center; justify-content:center; margin-right:8px; flex:none; vertical-align:middle;}

/* ---------- Histórico ---------- */
.hist-bars{display:flex; align-items:flex-end; gap:16px; padding:14px 4px 0; overflow-x:auto;}
.hist-bar-col{display:flex; flex-direction:column; align-items:center; flex:none; width:52px;}
.hist-bar-pct{font-size:12px; font-weight:800; color:var(--text); margin-bottom:5px;}
.hist-bar-track{width:100%; height:120px; display:flex; align-items:flex-end; background:var(--slate-bg); border-radius:6px; overflow:hidden;}
.hist-bar-fill{width:100%; transition:height .5s ease;}
.hist-bar-label{font-size:10.5px; color:var(--text-faint); margin-top:7px; text-align:center; text-transform:capitalize; line-height:1.35;}

.heat-table{width:100%; border-collapse:separate; border-spacing:4px 3px; font-size:12px;}
.heat-table th{padding:4px 8px; text-align:center; color:var(--text-faint); font-size:10px; text-transform:uppercase; font-weight:700; letter-spacing:.2px;}
.heat-modname{padding:8px 12px; font-size:12.3px; font-weight:600; color:var(--text); white-space:nowrap; text-align:left;}
.heat-cell{padding:8px 6px; text-align:center; font-weight:700; border-radius:7px; min-width:48px;}
.heat-na{padding:8px 6px; text-align:center; color:var(--text-faint);}

.dash-grid{display:grid; grid-template-columns:1.15fr .85fr; gap:16px; margin-bottom:16px;}
.chart-card{padding:20px 22px;}
.chart-card canvas{max-height:230px;}

.mod-bar-row{display:flex; align-items:center; gap:10px; padding:9px 6px; cursor:pointer; border-radius:8px; transition:background .15s; list-style:none;}
.mod-bar-row::-webkit-details-marker{display:none;}
.mod-bar-row:hover{background:var(--slate-bg);}
.mod-bar-row .chevron{flex:none; color:var(--text-faint); transition:transform .2s ease;}
details[open] > .mod-bar-row .chevron{transform:rotate(90deg); color:var(--brand);}
.mod-bar-row .mod-bar-body{flex:1; min-width:0;}
.mod-bar-row .m-name{font-size:12.5px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:4px;}
.mod-bar-row .m-pct{font-size:12px; font-weight:700; color:var(--text-soft); text-align:right; flex:none; white-space:nowrap;}
.stack-track{height:10px; border-radius:100px; background:var(--slate-bg); display:flex; overflow:hidden;}
details.drill{border-bottom:1px solid var(--border);}
details.drill:last-child{border-bottom:none;}
.drill-body{padding:2px 6px 12px 33px; animation:drillOpen .18s ease;}
@keyframes drillOpen{from{opacity:0;} to{opacity:1;}}
.drill-row{display:flex; align-items:center; gap:10px; padding:6px 0; font-size:12px; border-top:1px dashed var(--border);}
.drill-row:first-child{border-top:none;}
.drill-name{flex:1; color:var(--text); font-weight:500; min-width:0;}
.drill-person{color:var(--text-faint); white-space:nowrap; flex:none;}
.mini-bar{width:80px; height:6px; border-radius:100px; background:var(--slate-bg); overflow:hidden; display:inline-block;}
.mini-bar > div{height:100%; background:var(--green);}
.stack-seg{height:100%;}

.overdue-list{padding:18px 20px;}
.overdue-item{display:flex; justify-content:space-between; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); font-size:12.5px;}
.overdue-item:last-child{border-bottom:none;}
.overdue-item .oi-days{color:var(--danger); font-weight:800; font-size:11.5px; white-space:nowrap;}

/* ---------- Panel de control ---------- */
.locked-box{padding:60px 30px; text-align:center; color:var(--text-faint);}
.locked-box svg{margin-bottom:14px;}
.locked-box h3{color:var(--brand-dk); font-size:16px; margin:0 0 6px;}
.locked-box p{font-size:13px; max-width:340px; margin:0 auto;}

table.panel{width:100%; border-collapse:collapse; font-size:12.6px;}
table.panel th{text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.3px; color:var(--text-faint); font-weight:700; padding:9px 10px; border-bottom:1.5px solid var(--border); position:sticky; top:0; background:var(--card);}
table.panel td{padding:7px 10px; border-bottom:1px solid var(--border); vertical-align:middle;}
table.panel input[type=date]{border:1.5px solid var(--border); border-radius:7px; padding:5px 7px; font-size:12px; font-family:inherit; width:128px;}
table.panel input[type=date]:focus{outline:2px solid var(--green); outline-offset:0;}
.panel-scroll{max-height:560px; overflow:auto; border:1px solid var(--border); border-radius:var(--radius-sm);}
.row-saved{background:var(--green-bg) !important; transition:background 1.2s ease;}

/* ---------- Toast ---------- */
#toast-wrap{position:fixed; bottom:22px; right:22px; z-index:999; display:flex; flex-direction:column; gap:10px; align-items:flex-end;}
.toast{
  background:var(--brand-dk); color:#fff; padding:14px 18px; border-radius:12px; font-size:13px; font-weight:600;
  box-shadow:0 10px 30px rgba(0,0,0,.25); display:flex; align-items:center; gap:10px; max-width:340px;
  animation:toast-in .3s ease;
}
.toast.success{background:linear-gradient(120deg,var(--green-dk),var(--green));}
@keyframes toast-in{from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:translateY(0);}}

.empty-state{padding:50px 20px; text-align:center; color:var(--text-faint); font-size:13px;}

footer.foot{text-align:center; padding:30px 0 10px; font-size:11.5px; color:var(--text-faint);}

@media (max-width:880px){
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .dash-grid{grid-template-columns:1fr;}
  .task-row{grid-template-columns:1fr; align-items:flex-start;}
}
</style>
</head>
<body>

<div id="demo-banner-slot"></div>

<div id="app">
  <header class="top">

function cicloLabel(c){
  if(!c) return "—";
  let [y,m] = c.split('-').map(Number);
  m--; if(m<1){ m=12; y--; } // el trabajo del mes "c" cierra el mes anterior
  return `${MESES_LARGO[String(m).padStart(2,'0')]} ${y}`;
}
function initials(name){ return (name||'?').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
function fmtDate(iso){ if(!iso) return '—'; const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; }
function todayISO(){ const t=new Date(); return t.toISOString().slice(0,10); }
function slug(s){ return (s||'').replace(/[^a-zA-Z0-9]/g,''); }

/* =========================================================================
   AUTENTICACIÓN — Azure Static Web Apps + Entra ID ("Easy Auth")
   Mismo patrón que la herramienta de Grupo de Sola. Si no hay sesión SWA
   (por ejemplo mientras pruebas el archivo suelto), cae a modo demo.
   ========================================================================= */
async function initAuth(){
  try{
    const res = await fetch('/.auth/me');
    if(res.ok){
      const data = await res.json();
      const p = data && data.clientPrincipal;
      if(p && p.userDetails){
        const email = p.userDetails.toLowerCase();
        const name = Object.keys(EMPLEADOS).find(n => EMPLEADOS[n].toLowerCase() === email);
        currentUser = { name: name || p.userDetails, email, isAdmin: ADMIN_EMAILS.includes(email), isViewer: VIEWER_EMAILS.includes(email) };
        demoMode = false;
        return;
      }
    }
  }catch(e){ /* sin SWA/Easy Auth disponible -> demo */ }
  currentUser = null;
}

/* =========================================================================
   CAPA DE DATOS — histórico fijo + ciclo(s) vivo(s) generados desde
   TASK_TEMPLATE, combinados con overrides de Power Automate si están conectados
   ========================================================================= */
function configuredUrl(u){ return u && !u.startsWith('REEMPLAZAR'); }

function nextCycle(c){
  let [y,m] = c.split('-').map(Number);
  m++; if(m>12){ m=1; y++; }
  return `${y}-${String(m).padStart(2,'0')}`;
}
const HIST_CYCLES = [...new Set(SEED_HISTORICO.map(t=>t.ciclo))].sort();
const LIVE_START_CYCLE = nextCycle(HIST_CYCLES[HIST_CYCLES.length-1]);

function getLiveCycles(){
  const out = [];
  let c = LIVE_START_CYCLE;
  const hoy = todayISO().slice(0,7);
  while(c <= hoy){ out.push(c); c = nextCycle(c); }
  if(out.length===0) out.push(LIVE_START_CYCLE);
  return out;
}

/* =========================================================================
   DÍAS HÁBILES Y FERIADOS DE EL SALVADOR — usados para calcular la fecha
   límite de cada tarea como "el N-ésimo día hábil del mes", no un día fijo
   del calendario. Los feriados de fecha fija se repiten cada año; Semana
   Santa se calcula con el algoritmo de Gauss (depende de la Pascua), así
   que esto sigue funcionando en 2027, 2028, etc. sin tener que tocarlo.

   OJO: "Día de la Madre" y "Día del Padre" están incluidos porque aparecen
   en los feriados nacionales de El Salvador, pero no todas las empresas
   privadas los observan igual — ajusta FERIADOS_FIJOS si no aplican en Bolívar.
   ========================================================================= */
const FERIADOS_FIJOS = [
  [1,1],           // Año Nuevo
  [5,1],           // Día del Trabajo
  [5,10],          // Día de la Madre
  [6,17],          // Día del Padre
  [8,3],[8,4],[8,5],[8,6], // Fiestas Agostinas (San Salvador)
  [9,15],          // Día de la Independencia
  [11,2],          // Día de los Difuntos
  [12,25],         // Navidad
];

function easterSunday(year){
  const a=year%19, b=Math.floor(year/100), c=year%100, d=Math.floor(b/4), e=b%4,
        f=Math.floor((b+8)/25), g=Math.floor((b-f+1)/3), h=(19*a+b-d-g+15)%30,
        i=Math.floor(c/4), k=c%4, l=(32+2*e+2*i-h-k)%7, mm=Math.floor((a+11*h+22*l)/451),
        month=Math.floor((h+l-7*mm+114)/31), day=((h+l-7*mm+114)%31)+1;
  return new Date(year, month-1, day);
}

function feriadosDelAnio(year){
  const set = new Set();
  FERIADOS_FIJOS.forEach(([mo,d])=>{ set.add(`${year}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`); });
  const pascua = easterSunday(year);
  [-3,-2,-1].forEach(offset=>{ // Jueves, Viernes, Sábado Santo
    const d = new Date(pascua); d.setDate(d.getDate()+offset);
    set.add(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
  });
  return set;
}

function esDiaHabil(iso, feriadosSet){
  const dow = new Date(iso+'T00:00:00').getDay(); // 0=domingo, 6=sábado
  return dow!==0 && dow!==6 && !feriadosSet.has(iso);
}

function nthBusinessDayOfMonth(year, month, n){
  if(!n) return null;
  const feriados = feriadosDelAnio(year);
  const daysInMonth = new Date(year, month, 0).getDate();
  let count = 0;
  for(let day=1; day<=daysInMonth; day++){
    const iso = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    if(esDiaHabil(iso, feriados)){
      count++;
      if(count===n) return iso;
    }
  }
  return null;
}

function buildCycleFromTemplate(ciclo, overrides, idStart){
  const [y,m] = ciclo.split('-');
  let nextId = idStart;
  return TASK_TEMPLATE.map(t=>{
    const ov = overrides[t.k] || {};
    const fechaLimiteDefault = nthBusinessDayOfMonth(Number(y), Number(m), t.diaLimiteHabil);
    return {
      id: nextId++,
      taskKey: t.k,
      titulo: t.titulo,
      tarea: t.tarea,
      asignado: ov.asignado || t.asignado,
      fechaInicio: ov.fechaInicio || `${y}-${m}-01`,
      fechaLimite: ov.fechaLimite !== undefined ? ov.fechaLimite : fechaLimiteDefault,
      estado: ov.estado || 'No iniciado',
      ciclo, cicloLabel: cicloLabel(ciclo)
    };
  });
}

async function fetchEstadoCiclo(ciclo){
  if(configuredUrl(API.getEstadoCiclo)){
    try{
      const res = await fetch(`${API.getEstadoCiclo}${API.getEstadoCiclo.includes('?')?'&':'?'}ciclo=${ciclo}`);
      if(res.ok){
        const rows = await res.json();
        const map = {};
        (rows||[]).forEach(r=>{ map[r.taskKey] = r; });
        return map;
      }
    }catch(e){ console.warn('No se pudo leer el estado del ciclo '+ciclo+', usando plantilla base.', e); }
  }
  return {};
}

async function loadTareas(){
  allTasks = SEED_HISTORICO.map(t=>({...t}));
  let nextId = allTasks.length + 1;
  for(const ciclo of getLiveCycles()){
    const overrides = await fetchEstadoCiclo(ciclo);
    const tareas = buildCycleFromTemplate(ciclo, overrides, nextId);
    nextId += tareas.length;
    allTasks = allTasks.concat(tareas);
  }
}

async function persistEstado(task){
  if(!task.taskKey) return;
  if(configuredUrl(API.updateEstado)){
    try{
      await fetch(API.updateEstado, {method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ ciclo:task.ciclo, taskKey:task.taskKey, estado:task.estado, modificadoPor: currentUser?.email || 'demo' })});
    }catch(e){ console.warn('No se pudo guardar en SharePoint (modo demo).', e); }
  }
}
async function persistFechas(task){
  if(!task.taskKey) return;
  if(configuredUrl(API.updateFechas)){
    try{
      await fetch(API.updateFechas, {method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ ciclo:task.ciclo, taskKey:task.taskKey, fechaInicio:task.fechaInicio, fechaLimite:task.fechaLimite, modificadoPor: currentUser?.email || 'demo' })});
    }catch(e){ console.warn('No se pudo guardar fechas en SharePoint (modo demo).', e); }
  }
}
async function persistNotificacion(usuario, ciclo, total){
  if(configuredUrl(API.notificarCompletado)){
    try{
      await fetch(API.notificarCompletado, {method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ usuario, ciclo, total })});
    }catch(e){ console.warn('No se pudo enviar la notificación real (modo demo).', e); }
  }
}

/* =========================================================================
   HELPERS DE DATOS
   ========================================================================= */
function getCycles(){ return [...new Set(allTasks.map(t=>t.ciclo))].filter(Boolean).sort(); }
function tasksForCycle(c){ return allTasks.filter(t=>t.ciclo===c); }
function isOverdue(t){ return t.fechaLimite && t.estado!=='Completado' && t.estado!=='No aplica' && t.fechaLimite < todayISO(); }
function daysOverdue(t){ const d1=new Date(t.fechaLimite), d2=new Date(todayISO()); return Math.round((d2-d1)/86400000); }
function pctClass(e){ return e.replace(/\s/g,''); }

function computeStats(tasks){
  const relevant = tasks.filter(t=>!NO_CUENTAN.includes(t.estado));
  const completado = tasks.filter(t=>t.estado==='Completado').length;
  const enProceso = tasks.filter(t=>t.estado==='En proceso').length;
  const noIniciado = tasks.filter(t=>t.estado==='No iniciado').length;
  const noAplica = tasks.filter(t=>t.estado==='No aplica').length;
  const total = tasks.length;
  const pct = relevant.length ? Math.round(100*completado/relevant.length) : 0;
  return {total, completado, enProceso, noIniciado, noAplica, pct, relevant: relevant.length};
}

function checkPersonComplete(name, ciclo){
  const key = name+'|'+ciclo;
  const tasks = allTasks.filter(t=>t.asignado===name && t.ciclo===ciclo);
  const relevant = tasks.filter(t=>!NO_CUENTAN.includes(t.estado));
  const done = relevant.length>0 && relevant.every(t=>t.estado==='Completado');
  if(done && !notifiedThisSession.has(key)){
    notifiedThisSession.add(key);
    showToast(`${name} completó el 100% de sus tareas — ${cicloLabel(ciclo)}`, true);
    persistNotificacion(name, ciclo, relevant.length);
  }
}

function renderTabs(){
  const el = document.getElementById('tabs');

  if(currentUser && currentUser.isViewer && !currentUser.isAdmin){
    tabs = [
      {id:'dashboard', label:'Dashboard'},
      {id:'historico', label:'Histórico'},
    ];
  } else {
    tabs = [
      {id:'mis-tareas', label:'Mis tareas'},

    ];

}

function renderAll(){
  renderDemoBanner();
  renderHeadRight();
  renderTabs();
  renderView();
}

function renderView(){
  const esVisorPuro = currentUser && currentUser.isViewer && !currentUser.isAdmin;
  if(esVisorPuro && (activeTab==='mis-tareas' || activeTab==='panel')) activeTab='dashboard';
  if(activeTab==='mis-tareas') return renderMisTareas();
  if(activeTab==='dashboard') return renderDashboard();
  if(activeTab==='historico') return renderHistorico();
  if(activeTab==='panel') return renderPanel();
}

/* =========================================================================
   VISTA: MIS TAREAS
   ========================================================================= */
function renderMisTareas(){
  const view = document.getElementById('view');
  if(!currentUser){
    view.innerHTML = `<div class="card empty-state">Identifícate para ver tus tareas asignadas.<br>En producción esto ocurre automático con tu sesión de Microsoft 365.</div>`;
    return;
  }
  const cycleTasks = tasksForCycle(currentCycle);
  const mine = cycleTasks.filter(t=>t.asignado===currentUser.name);

  if(mine.length===0){
    view.innerHTML = `<div class="card empty-state">No tienes tareas asignadas en <strong>${cicloLabel(currentCycle)}</strong>.<br>Puedes revisar el avance general en el Dashboard.</div>`;
    return;
  }

  const stats = computeStats(mine);
  const byModulo = {};
  mine.forEach(t=>{ (byModulo[t.titulo] = byModulo[t.titulo]||[]).push(t); });

  let html = `<div class="mt-head">
    <div class="mt-progress-card" style="flex:1">
      <div><div class="mt-progress-num">${stats.pct}%</div><div class="mt-progress-label">completado</div></div>
      <div class="pbar-track"><div class="pbar-fill" style="width:${stats.pct}%"></div></div>
      <div style="font-size:12.5px; opacity:.85; font-weight:600;">${stats.completado} de ${stats.relevant} tareas · ${cicloLabel(currentCycle)}</div>
    </div>
    <button class="btn btn-ghost" id="mt-export"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 3v13m0 0 4-4m-4 4-4-4M5 21h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Descargar mis tareas</button>
  </div>`;

  Object.keys(byModulo).forEach(mod=>{
    const items = byModulo[mod];
    const s = computeStats(items);
    html += `<div class="modulo-group card">
      <div class="modulo-head">
        <h3>${mod}</h3>
        ${s.pct===100?`<div style="width:34px;height:34px;overflow:hidden;margin-right:2px;">${stampSVG()}</div>`:''}
        <span class="m-count">${s.completado}/${s.relevant} · ${s.pct}%</span>
      </div>
      ${items.map(t=>taskRowHTML(t)).join('')}
    </div>`;
  });

  view.innerHTML = html;
  view.querySelectorAll('select.estado-select').forEach(sel=>{
    sel.onchange = async (e)=>{
      const id = parseInt(e.target.dataset.id);
      const task = allTasks.find(x=>x.id===id);
      task.estado = e.target.value;
      e.target.className = 'estado-select ' + pctClass(task.estado);
      await persistEstado(task);
      checkPersonComplete(task.asignado, task.ciclo);
      renderMisTareas();
    };
  });
  document.getElementById('mt-export').onclick = ()=> exportTasks(mine, `Mis_Tareas_${currentUser.name.replace(/\s/g,'_')}_${currentCycle}`);
}

function taskRowHTML(t){
  const overdue = isOverdue(t);
  return `<div class="task-row">
    <div>
      <div class="task-title">${t.tarea}</div>
      <div class="task-meta ${overdue?'overdue':''}">${overdue?`⚠ Vencida hace ${daysOverdue(t)} día(s) · `:''}Límite: ${fmtDate(t.fechaLimite)}</div>
    </div>
    <select class="estado-select ${pctClass(t.estado)}" data-id="${t.id}">
      ${['No iniciado','En proceso','Completado','No aplica'].map(op=>`<option value="${op}" ${t.estado===op?'selected':''}>${op}</option>`).join('')}
    </select>
    <span></span>
  </div>`;
}

    </details>`;
  }).join('');

  document.getElementById('person-rows').innerHTML = personRows.map(p=>{
    const pTasks = tasks.filter(t=>t.asignado===p.n)
      .sort((a,b)=>(a.estado==='Completado')-(b.estado==='Completado'));
    return `<details class="drill">
      <summary class="mod-bar-row">
        <svg class="chevron" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M9 6l6 6-6 6"/></svg>
        <span class="p-avatar">${initials(p.n)}</span>
        <div class="mod-bar-body">
          <div class="m-name">${p.n}${p.pct===100?' 🟢':''}</div>
          <div class="mini-bar"><div style="width:${p.pct}%"></div></div>
        </div>
        <div class="m-pct">${p.completado}/${p.relevant} · ${p.pct}%</div>
      </summary>
      <div class="drill-body">
        ${pTasks.map(t=>`<div class="drill-row">
          <span class="pill ${pctClass(t.estado)}"><span class="dot"></span>${t.estado}</span>
          <span class="drill-name">${t.tarea}</span>
          <span class="drill-person">${t.titulo}</span>
        </div>`).join('')}
      </div>
    </details>`;
  }).join('');

  const kpiVencidas = document.getElementById('kpi-vencidas');
  if(kpiVencidas) kpiVencidas.onclick = ()=> document.getElementById('overdue-section').scrollIntoView({behavior:'smooth', block:'center'});

  const C = 2*Math.PI*46;
  const donutSegs = [
    {label:'Completado', value:stats.completado, color:'#00A651'},
    {label:'En proceso', value:stats.enProceso, color:'#FA8D29'},
    {label:'No iniciado', value:stats.noIniciado, color:'#C9D1DE'},
    {label:'No aplica', value:stats.noAplica, color:'#B9BAE0'},
  ];
  let acc = 0;
  const arcs = donutSegs.filter(s=>s.value>0).map(s=>{
    const len = (s.value/(stats.total||1))*C;
    const arc = `<circle cx="60" cy="60" r="46" fill="none" stroke="${s.color}" stroke-width="16"
      stroke-dasharray="${len.toFixed(2)} ${(C-len).toFixed(2)}" stroke-dashoffset="${(-acc).toFixed(2)}"/>`;
    acc += len;
    return arc;
  }).join('');
  document.getElementById('donut-mount').innerHTML = `
    <div class="donut-wrap">
      <svg viewBox="0 0 120 120" class="donut-svg">
        <circle cx="60" cy="60" r="46" fill="none" stroke="var(--border)" stroke-width="16"/>
        ${arcs}
      </svg>
      <div class="donut-center"><div class="donut-center-pct">${stats.pct}%</div><div class="donut-center-sub">completado</div></div>
    </div>
    <div class="donut-legend">
      ${donutSegs.map(s=>`<div class="legend-item"><span class="legend-dot" style="background:${s.color}"></span>${s.label} <b>${s.value}</b></div>`).join('')}
    </div>`;

  document.getElementById('dash-export-cycle').onclick = ()=> exportTasks(tasks, `Cierre_Contable_${currentCycle}`);
  document.getElementById('dash-export-all').onclick = ()=> exportTasks(allTasks, `Cierre_Contable_Historico_Completo`);
}

/* =========================================================================
   VISTA: HISTÓRICO — comportamiento a través de todos los ciclos
   ========================================================================= */
function moduleOrder(){
  const fromTemplate = [...new Set(TASK_TEMPLATE.map(t=>t.titulo))];
  const fromHistory = [...new Set(allTasks.map(t=>t.titulo))];
  const extra = fromHistory.filter(m=>!fromTemplate.includes(m));
  return [...fromTemplate, ...extra];
}

function semaforoColor(pct){ return pct>=90?'#00A651':pct>=50?'#FA8D29':'#D64550'; }

function renderHistorico(){
  const view = document.getElementById('view');
  const ciclos = getCycles();
  const cortos = ciclos.map(c=>cicloLabel(c).split(' ')[0].slice(0,3));
  const porCiclo = ciclos.map(c=>({ciclo:c, ...computeStats(tasksForCycle(c))}));
  const modulos = moduleOrder();

  const bars = porCiclo.map((p,idx)=>{
    const h = Math.max(4, Math.round(120*p.pct/100));
    return `<div class="hist-bar-col">
      <div class="hist-bar-pct">${p.pct}%</div>
      <div class="hist-bar-track"><div class="hist-bar-fill" style="height:${h}px;background:${semaforoColor(p.pct)}"></div></div>
      <div class="hist-bar-label">${cortos[idx]}<br><span style="opacity:.6">${p.ciclo.split('-')[0]}</span></div>
    </div>`;
  }).join('');

  const heatRows = modulos.map(m=>{
    const cells = ciclos.map(c=>{
      const rows = allTasks.filter(t=>t.titulo===m && t.ciclo===c);
      if(rows.length===0) return `<td class="heat-na">—</td>`;
      const s = computeStats(rows);
      const bg = s.pct>=90?'var(--green-bg)':s.pct>=50?'var(--orange-bg)':'var(--danger-bg)';
      const fg = s.pct>=90?'var(--green-dk)':s.pct>=50?'#9A5300':'var(--danger)';
      return `<td class="heat-cell" style="background:${bg};color:${fg}">${s.pct}%</td>`;
    }).join('');
    return `<tr><td class="heat-modname">${m}</td>${cells}</tr>`;
  }).join('');

  // Tareas de ciclos ya cerrados (todos menos el más reciente) que quedaron sin completar
  const cicloVivo = ciclos[ciclos.length-1];
  const pendientesHistoricas = allTasks
    .filter(t=>t.ciclo!==cicloVivo && t.estado!=='Completado' && t.estado!=='No aplica')
    .sort((a,b)=> a.ciclo===b.ciclo ? a.titulo.localeCompare(b.titulo) : a.ciclo.localeCompare(b.ciclo));

  view.innerHTML = `
    <div class="card" style="padding:22px 24px; margin-bottom:16px;">
      <div class="section-title">Avance por ciclo</div>
      <div class="section-sub">% completado en cada cierre, del más antiguo al más reciente</div>
      <div class="hist-bars">${bars}</div>
    </div>
    <div class="card" style="padding:22px 24px; margin-bottom:16px;">
      <div class="section-title">Cumplimiento por módulo</div>
      <div class="section-sub">% completado de cada módulo en cada ciclo — así se ven los que fallan seguido. "—" = el módulo no existía ese mes.</div>
      <div class="table-scroll">
        <table class="heat-table">
          <thead><tr><th></th>${cortos.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
          <tbody>${heatRows}</tbody>
        </table>
      </div>
    </div>
    <div class="card" style="padding:22px 24px;">
      <div class="section-title">Tareas que no se cumplieron</div>
      <div class="section-sub">De ciclos ya cerrados (no incluye ${cicloLabel(cicloVivo)}, que sigue en curso) — ${pendientesHistoricas.length} en total</div>
      <div class="table-scroll" style="max-height:340px; overflow-y:auto;">
        <table class="heat-table" style="font-size:12.3px;">
          <thead><tr><th style="text-align:left;">Ciclo</th><th style="text-align:left;">Módulo / Tarea</th><th style="text-align:left;">Persona</th><th style="text-align:left;">Fecha límite</th><th style="text-align:left;">Estado</th></tr></thead>
          <tbody>${pendientesHistoricas.map(t=>`<tr>
            <td style="padding:6px 8px;white-space:nowrap;">${cicloLabel(t.ciclo)}</td>
            <td style="padding:6px 8px;"><strong>${t.titulo}</strong><br><span style="color:var(--text-faint)">${t.tarea}</span></td>
            <td style="padding:6px 8px;white-space:nowrap;">${t.asignado}</td>
            <td style="padding:6px 8px;white-space:nowrap;">${t.fechaLimite?fmtDate(t.fechaLimite):'Sin fecha'}</td>
            <td style="padding:6px 8px;white-space:nowrap;color:${t.estado==='En proceso'?'#9A5300':'var(--text-faint)'}">${t.estado}</td>
          </tr>`).join('') || '<tr><td colspan="5" style="padding:14px 8px;color:var(--text-faint);">Todos los ciclos cerrados se completaron al 100% ✅</td></tr>'}</tbody>
        </table>
      </div>
    </div>
  `;
}

/* =========================================================================
   VISTA: PANEL DE CONTROL (solo Derlin De León)
   ========================================================================= */
function renderPanel(){
  const view = document.getElementById('view');
  if(!currentUser || !currentUser.isAdmin){
    view.innerHTML = `<div class="card locked-box">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="9" rx="2" stroke="#93A0B4" stroke-width="1.7"/><path d="M8 11V8a4 4 0 0 1 8 0v3" stroke="#93A0B4" stroke-width="1.7"/></svg>
      <h3>Acceso restringido</h3>
      <p>Solo Derlin De León puede modificar las fechas del cierre contable.</p>
    </div>`;
    return;
  }
  const tasks = tasksForCycle(currentCycle).slice().sort((a,b)=> a.titulo.localeCompare(b.titulo));

  view.innerHTML = `
    <div class="mt-head" style="align-items:flex-start;">
      <div>
        <div class="section-title">Panel de control — ${cicloLabel(currentCycle)}</div>
        <div class="section-sub">Edita fechas de inicio y límite. Los cambios se guardan por fila.</div>
      </div>

    </div>
    <div class="card panel-scroll">
      <table class="panel">
        <thead><tr><th>Módulo</th><th>Tarea</th><th>Asignado</th><th>Fecha inicio</th><th>Fecha límite</th><th>Estado</th><th></th></tr></thead>
        <tbody id="panel-body">
          ${tasks.map(t=>`<tr id="row-${t.id}">
            <td style="max-width:170px;">${t.titulo}</td>
            <td style="max-width:230px;">${t.tarea}</td>
            <td>${t.asignado}</td>
            <td><input type="date" value="${t.fechaInicio||''}" data-id="${t.id}" data-field="fechaInicio"></td>
            <td><input type="date" value="${t.fechaLimite||''}" data-id="${t.id}" data-field="fechaLimite"></td>
            <td><span class="pill ${pctClass(t.estado)}"><span class="dot"></span>${t.estado}</span></td>
            <td><button class="btn btn-green btn-sm save-row" data-id="${t.id}">Guardar</button></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  `;

  view.querySelectorAll('.save-row').forEach(btn=>{
    btn.onclick = async ()=>{
      const id = parseInt(btn.dataset.id);
      const row = document.getElementById('row-'+id);
      const task = allTasks.find(t=>t.id===id);
      row.querySelectorAll('input[type=date]').forEach(inp=>{ task[inp.dataset.field] = inp.value || null; });
      await persistFechas(task);
      row.classList.add('row-saved');
      setTimeout(()=>row.classList.remove('row-saved'), 1200);
      showToast('Fechas actualizadas para: '+task.tarea);
    };
  });

}

/* =========================================================================
   EXPORTAR (SheetJS)
   ========================================================================= */
function exportTasks(tasks, filename){
  const data = tasks.map(t=>({
    Módulo:t.titulo, Tarea:t.tarea, Asignado:t.asignado,
    'Fecha inicio':fmtDate(t.fechaInicio), 'Fecha límite':fmtDate(t.fechaLimite),
    Estado:t.estado, Ciclo:cicloLabel(t.ciclo)
  }));
  const ws = XLSX.utils.json_to_sheet(data);
  ws['!cols'] = [{wch:34},{wch:46},{wch:20},{wch:13},{wch:13},{wch:13},{wch:14}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Cierre Contable');
  XLSX.writeFile(wb, filename+'.xlsx');
}

/* =========================================================================
   TOAST
   ========================================================================= */
function showToast(msg, success=false){
  const wrap = document.getElementById('toast-wrap');
  const t = document.createElement('div');
  t.className = 'toast' + (success?' success':'');
  t.innerHTML = (success?'🎉 ':'✓ ')+msg;
  wrap.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity .4s'; setTimeout(()=>t.remove(),400); }, 4200);
}

/* =========================================================================
   INIT
   ========================================================================= */
(async function init(){
  await initAuth();
  await loadTareas();
  const cycles = getCycles();
  currentCycle = cycles[cycles.length-1] || null;
  renderAll();
})();
</script>
